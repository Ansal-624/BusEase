{% extends 'base.html' %}
{% block content %}
<h3>Cancel E-Card for {{ concession.traveller.username }}</h3>
<form method="post">{% csrf_token %}
  <label>Reason for Cancellation:</label>
  <textarea name="reason" class="form-control mb-3" required></textarea>
  <button type="submit" class="btn btn-warning">Cancel E-Card</button>
  <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary">Back</a>
</form>
{% endblock %}
