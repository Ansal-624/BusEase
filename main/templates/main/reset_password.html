{% extends "base.html" %}
{% block title %}Reset Password - BusEase{% endblock %}
{% block content %}

<style>
  /* === SAME DESIGN SYSTEM AS LOGIN === */
  .login-wrapper {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .login-container {
    max-width: 480px;
    width: 100%;
  }

  .login-card {
    background: white;
    border-radius: 24px;
    padding: 50px 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
    border: none;
    animation: slideUp 0.6s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #667eea, #764ba2);
  }

  .login-header {
    text-align: center;
    margin-bottom: 35px;
  }

  .login-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 10px 30px rgba(102,126,234,0.3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .login-icon i {
    font-size: 2.5rem;
    color: white;
  }

  .login-title {
    font-size: 2rem;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
  }

  .login-subtitle {
    color: #666;
    font-size: 1rem;
  }

  .form-label {
    font-weight: 600;
    color: #444;
    margin-bottom: 8px;
  }

  .input-group {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    font-size: 1.1rem;
    z-index: 10;
  }

  .form-control {
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    padding: 14px 18px 14px 50px;
    font-size: 1rem;
    background: #f8f9fa;
    transition: all 0.3s ease;
  }

  .form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
    background: white;
    outline: none;
  }

  .password-toggle {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 1.2rem;
  }

  .password-toggle:hover {
    color: #667eea;
  }

  .btn-login {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1.1rem;
    font-weight: 600;
    color: white;
    width: 100%;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 8px 20px rgba(102,126,234,0.3);
    transition: all 0.3s ease;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(102,126,234,0.4);
  }

  .back-link {
    text-align: center;
    margin-top: 25px;
    font-size: 0.95rem;
  }

  .back-link a {
    color: #667eea;
    font-weight: 600;
    text-decoration: none;
  }

  .back-link a:hover {
    color: #764ba2;
    text-decoration: underline;
  }
</style>

<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-icon">
          <i class="bi bi-shield-lock"></i>
        </div>
        <h2 class="login-title">Reset Password</h2>
        <p class="login-subtitle">
          Create a new secure password
        </p>
      </div>

      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}

      <!-- Reset Form -->
      <form method="POST">
        {% csrf_token %}

        <!-- New Password -->
        <div class="mb-4">
          <label class="form-label">New Password</label>
          <div class="input-group">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              type="password"
              name="password1"
              id="password1"
              class="form-control"
              placeholder="Enter new password"
              required
            >
            <button type="button" class="password-toggle" onclick="togglePass('password1','icon1')">
              <i class="bi bi-eye" id="icon1"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <div class="input-group">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              type="password"
              name="password2"
              id="password2"
              class="form-control"
              placeholder="Confirm new password"
              required
            >
            <button type="button" class="password-toggle" onclick="togglePass('password2','icon2')">
              <i class="bi bi-eye" id="icon2"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="bi bi-check-circle"></i> Update Password
        </button>
      </form>

      <div class="back-link">
        <a href="{% url 'login' %}">← Back to Login</a>
      </div>

    </div>
  </div>
</div>

<script>
  function togglePass(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("bi-eye-slash", "bi-eye");
    }
  }
</script>

{% endblock %}
